version: '3.8'

services:
  app:
    build: .
    container_name: chitfund_app
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      # These are read by the entrypoint wait script
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      # Spring Boot datasource (overrides if set)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: chitfund_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # By default we do not publish DB port to the host to avoid collisions.
    # Uncomment the line below to expose MySQL on host port 3306
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
    driver: local
