version: '3.8'
services:
  app:
    build: .
    container_name: chitfund_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/chitfund
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: MySQL@1234
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: chitfund_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chitfund
    ports:
      - "3306:3306"
